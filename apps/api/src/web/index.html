<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Console — Day 06</title>
    <style>
      :root {
        --bg: #1a1a1a;
        --bg-panel: #232323;
        --bg-input: #1f1f1f;
        --fg: #e6e6e6;
        --fg-muted: #8b8b8b;
        --accent: #4ade80;
        --accent-blue: #60a5fa;
        --border: #2e2e2e;
        --error: #f87171;
        --user-bubble: #2a3f5f;
        --ai-bubble: #1f3528;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei',
          sans-serif;
        font-size: 13px;
        line-height: 1.5;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      /* ============ 顶栏 ============ */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      header .title {
        font-weight: 600;
        font-size: 14px;
      }
      header .title .badge {
        font-size: 11px;
        font-weight: 400;
        color: var(--fg-muted);
        margin-left: 8px;
      }
      header .actions {
        display: flex;
        gap: 8px;
      }
      header button {
        padding: 4px 10px;
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      header button:hover {
        border-color: var(--fg-muted);
      }

      /* ============ 双栏布局 ============ */
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 360px;
        min-height: 0;
      }
      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
        border-right: 1px solid var(--border);
      }
      .panel:last-child {
        border-right: none;
      }
      .panel-header {
        padding: 10px 16px;
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        color: var(--fg-muted);
        flex-shrink: 0;
      }
      .panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      /* ============ Conversation（左栏） ============ */
      .message {
        max-width: 85%;
        padding: 8px 12px;
        border-radius: 8px;
        margin-bottom: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .message .role {
        font-size: 11px;
        color: var(--fg-muted);
        margin-bottom: 2px;
      }
      .message.user {
        background: var(--user-bubble);
        margin-left: auto;
      }
      .message.ai {
        background: var(--ai-bubble);
      }
      .message.error {
        background: rgba(248, 113, 113, 0.15);
        border: 1px solid var(--error);
        color: var(--error);
      }
      .message.thinking {
        background: transparent;
        color: var(--fg-muted);
        font-style: italic;
      }
      .empty-hint {
        color: var(--fg-muted);
        text-align: center;
        padding: 40px 16px;
        font-size: 13px;
      }

      /* ============ Execution Timeline（右栏） ============ */
      .timeline-step {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 10px 12px;
        margin-bottom: 8px;
        background: var(--bg-panel);
        border: 1px solid var(--border);
        border-left: 3px solid var(--border);
        border-radius: 6px;
      }
      .timeline-step.done {
        border-left-color: var(--accent);
      }
      .timeline-step.active {
        border-left-color: var(--accent-blue);
        background: #1f2a3a;
      }
      .timeline-step.error {
        border-left-color: var(--error);
      }
      .timeline-step .icon {
        flex-shrink: 0;
        width: 18px;
        text-align: center;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--fg-muted);
        font-size: 14px;
        line-height: 1.3;
      }
      .timeline-step.done .icon {
        color: var(--accent);
      }
      .timeline-step.active .icon {
        color: var(--accent-blue);
      }
      .timeline-step.error .icon {
        color: var(--error);
      }
      .timeline-step .body {
        flex: 1;
        min-width: 0;
      }
      .timeline-step .step-label {
        font-weight: 500;
        margin-bottom: 4px;
        color: var(--fg);
        font-size: 13px;
      }
      .timeline-step .step-detail {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: #b8b8b8;
        background: rgba(0, 0, 0, 0.3);
        padding: 4px 6px;
        border-radius: 4px;
        white-space: pre-wrap;
        word-break: break-all;
      }

      /* ============ 输入栏 ============ */
      footer {
        padding: 10px 16px;
        background: var(--bg-panel);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .input-row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }
      textarea {
        flex: 1;
        min-height: 38px;
        max-height: 120px;
        padding: 8px 12px;
        background: var(--bg-input);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        resize: none;
        font-family: inherit;
        font-size: 13px;
        line-height: 1.4;
      }
      textarea:focus {
        outline: none;
        border-color: var(--accent-blue);
      }
      button.send {
        padding: 8px 18px;
        background: var(--accent);
        color: #0a0a0a;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        height: 38px;
      }
      button.send:disabled {
        background: #4b5563;
        cursor: not-allowed;
      }

      /* ============ 小屏：单栏堆叠 ============ */
      @media (max-width: 720px) {
        main {
          grid-template-columns: 1fr;
        }
        .panel:first-child {
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title">
        Agent Console
        <span class="badge">Day 06 · POST /agent · SSE</span>
      </div>
      <div class="actions">
        <button id="clear-btn">Clear</button>
      </div>
    </header>

    <main>
      <section class="panel">
        <div class="panel-header">Conversation</div>
        <div class="panel-body" id="conversation">
          <div class="empty-hint">发条消息试试，比如"用 calculator 计算 10+20"</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">Execution Timeline</div>
        <div class="panel-body" id="timeline">
          <div class="empty-hint" style="font-size: 12px">等待任务</div>
        </div>
      </section>
    </main>

    <footer>
      <div class="input-row">
        <textarea id="input" placeholder="说点什么……（Ctrl/⌘+Enter 发送）" rows="1"></textarea>
        <button id="send-btn" class="send">Send</button>
      </div>
    </footer>

    <script>
      // ============ 元素引用 ============
      const inputEl = document.getElementById('input');
      const sendBtn = document.getElementById('send-btn');
      const clearBtn = document.getElementById('clear-btn');
      const conversationEl = document.getElementById('conversation');
      const timelineEl = document.getElementById('timeline');

      // ============ Conversation（左栏）============
      function addMessage(role, content, opts) {
        const opt = opts || {};
        // 清掉 empty-hint
        const hint = conversationEl.querySelector('.empty-hint');
        if (hint) hint.remove();
        const el = document.createElement('div');
        el.className = 'message ' + role;
        const roleEl = document.createElement('div');
        roleEl.className = 'role';
        roleEl.textContent = opt.roleLabel || role;
        el.appendChild(roleEl);
        const body = document.createElement('div');
        body.textContent = content;
        el.appendChild(body);
        conversationEl.appendChild(el);
        conversationEl.scrollTop = conversationEl.scrollHeight;
        return el;
      }
      function setThinking(text) {
        // 移除已有的 thinking
        const existing = conversationEl.querySelector('.message.thinking');
        if (existing) existing.remove();
        if (!text) return;
        const el = document.createElement('div');
        el.className = 'message thinking';
        el.textContent = text;
        conversationEl.appendChild(el);
        conversationEl.scrollTop = conversationEl.scrollHeight;
      }

      // ============ Execution Timeline（右栏）============
      function resetTimeline() {
        timelineEl.innerHTML = '';
      }
      function addTimelineStep(label, detail, status, opts) {
        // status: 'done' | 'active' | 'error' | 'pending' (默认 'done')
        // opts.collapsible: detail 放进 <details> 默认折叠（用于长 JSON）
        // opts.collapsibleOpen: 默认展开
        // opts.summaryText: 折叠区 summary 文字
        const opt = opts || {};
        const step = document.createElement('div');
        step.className = 'timeline-step ' + (status || 'done');
        const icon = document.createElement('div');
        icon.className = 'icon';
        if (status === 'error') icon.textContent = '✗';
        else if (status === 'active') icon.textContent = '…';
        else icon.textContent = '✓';
        step.appendChild(icon);
        const body = document.createElement('div');
        body.className = 'body';
        const lbl = document.createElement('div');
        lbl.className = 'step-label';
        lbl.textContent = label;
        body.appendChild(lbl);
        if (detail) {
          if (opt.collapsible || opt.collapsibleOpen) {
            const det = document.createElement('details');
            if (opt.collapsibleOpen) det.open = true;
            const sm = document.createElement('summary');
            sm.textContent = opt.summaryText || '查看详情';
            det.appendChild(sm);
            const pre = document.createElement('pre');
            pre.className = 'step-detail';
            pre.textContent = detail;
            det.appendChild(pre);
            body.appendChild(det);
          } else {
            const det = document.createElement('div');
            det.className = 'step-detail';
            det.textContent = detail;
            body.appendChild(det);
          }
        }
        step.appendChild(body);
        timelineEl.appendChild(step);
        timelineEl.scrollTop = timelineEl.scrollHeight;
      }

      // ============ AgentEvent 路由到两栏 ============
      function dispatch(ev) {
        switch (ev.kind) {
          case 'message_start':
            setThinking('Agent 接收任务…');
            addTimelineStep('接收任务', null, 'done');
            break;
          case 'iteration':
            addTimelineStep('Iteration ' + ev.n, null, 'active');
            break;
          case 'request': {
            const payload = { iteration: ev.iteration, messages: ev.messages };
            addTimelineStep(
              'request · Iteration ' + ev.iteration,
              JSON.stringify(payload, null, 2),
              'active',
              { collapsible: true, summaryText: '📨 查看 LLM 请求（messages 累计）' },
            );
            break;
          }
          case 'response': {
            const payload = {
              iteration: ev.iteration,
              content: ev.content,
              toolCalls: ev.toolCalls,
            };
            addTimelineStep(
              'response · Iteration ' + ev.iteration,
              JSON.stringify(payload, null, 2),
              'active',
              { collapsible: true, summaryText: '🤖 查看 LLM 响应' },
            );
            break;
          }
          case 'tool_call':
            addTimelineStep('调用 ' + ev.name, JSON.stringify(ev.args), 'active');
            break;
          case 'tool_result':
            addTimelineStep('Tool 返回', ev.output, 'done');
            break;
          case 'message_end':
            setThinking(null);
            addMessage('ai', ev.content, { roleLabel: 'AI' });
            addTimelineStep('生成答案', ev.content, 'done');
            break;
          case 'done':
            addTimelineStep('完成', null, 'done');
            break;
          case 'error':
            setThinking(null);
            addMessage('error', ev.message, { roleLabel: 'Error' });
            addTimelineStep('错误', ev.message, 'error');
            break;
        }
      }

      // ============ SSE 帧解析 ============
      async function* parseSSEStream(body) {
        const reader = body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let idx;
          while ((idx = buf.indexOf('\n\n')) !== -1) {
            const raw = buf.slice(0, idx);
            buf = buf.slice(idx + 2);
            const parsed = parseFrame(raw);
            if (parsed) yield parsed;
          }
        }
      }
      function parseFrame(raw) {
        let event = '';
        let data = '';
        for (const line of raw.split('\n')) {
          if (line.startsWith('event:')) event = line.slice(6).trim();
          else if (line.startsWith('data:')) data += line.slice(5).trim();
        }
        if (!event || !data) return null;
        try {
          return { event, data: JSON.parse(data) };
        } catch {
          return null;
        }
      }

      // ============ 主流程 ============
      function setBusy(busy) {
        sendBtn.disabled = busy;
        inputEl.disabled = busy;
      }
      async function send() {
        const input = inputEl.value.trim();
        if (!input) return;
        // 清空两栏（单 turn，YAGNI 不持久化）
        resetTimeline();
        // 保留 conversation 的用户消息——单 turn 也展示，让用户看到自己发过什么
        const existing = conversationEl.querySelectorAll('.message');
        existing.forEach((m) => m.remove());
        addMessage('user', input, { roleLabel: 'You' });
        inputEl.value = '';
        setBusy(true);
        try {
          const res = await fetch('/agent', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ input }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({ error: 'request failed' }));
            addMessage('error', `[${res.status}] ${err.error || 'request failed'}`, {
              roleLabel: 'Error',
            });
            addTimelineStep('请求失败', '[' + res.status + '] ' + (err.error || ''), 'error');
            return;
          }
          if (!res.body) {
            addMessage('error', 'response has no body', { roleLabel: 'Error' });
            return;
          }
          for await (const frame of parseSSEStream(res.body)) {
            dispatch(frame.data);
          }
        } catch (err) {
          const msg = err && err.message ? err.message : String(err);
          addMessage('error', msg, { roleLabel: 'Error' });
          addTimelineStep('网络错误', msg, 'error');
        } finally {
          setBusy(false);
        }
      }

      sendBtn.addEventListener('click', send);
      clearBtn.addEventListener('click', () => {
        conversationEl.innerHTML =
          '<div class="empty-hint">发条消息试试，比如"用 calculator 计算 10+20"</div>';
        resetTimeline();
        timelineEl.innerHTML = '<div class="empty-hint" style="font-size:12px">等待任务</div>';
        inputEl.value = '';
        inputEl.focus();
      });
      inputEl.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          send();
        }
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });
      // 自适应高度
      inputEl.addEventListener('input', () => {
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
      });
      inputEl.focus();
    </script>
  </body>
</html>
